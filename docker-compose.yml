services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: backend
    container_name: apiconf-agent-backend
    env_file:
      - .env
    networks:
      - apiconf-network
    restart: unless-stopped
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/agents/health"]
      interval: 20s
      timeout: 10s
      retries: 3
    volumes:
      - ./data:/app/data
      - ./app:/app/app
      - ./tests:/app/tests
      - ./scripts:/app/scripts
      - ./main.py:/app/main.py
      - ./pyproject.toml:/app/pyproject.toml
      - ./poetry.lock:/app/poetry.lock

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: apiconf-agent-nginx
    ports:
      - "2025:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - apiconf-network
    restart: unless-stopped

  csv-updater:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: csv-updater
    container_name: apiconf-csv-updater
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "cron"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - apiconf-network

  redis:
    image: "redis:alpine"
    container_name: apiconf-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - apiconf-network
    restart: unless-stopped

networks:
  apiconf-network:
    driver: bridge

volumes:
  redis-data:
